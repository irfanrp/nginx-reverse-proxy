# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name vpn.aboutdevops.my.id;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - vpn.aboutdevops.my.id -> Pritunl Web UI
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vpn.aboutdevops.my.id;

    ssl_certificate /etc/letsencrypt/live/aboutdevops.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aboutdevops.my.id/privkey.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://printuln-pritunl:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "upgrade";

    }
}
