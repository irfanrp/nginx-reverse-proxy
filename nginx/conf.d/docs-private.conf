# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name docs-private.aboutdevops.my.id;
    include /etc/nginx/snippets/redirect-https.conf;
}

# HTTPS - docs-private.aboutdevops.my.id -> Docusaurus (gated by Authelia)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name docs-private.aboutdevops.my.id;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/authelia-authz-location.conf;

    # Report API (UI stays on docs-private; /api/* → docs-report-api)
    location /api/ {
        include /etc/nginx/snippets/authelia-authreq.conf;
        proxy_pass http://docs-report-api:4001;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 20m;
    }

    location / {
        include /etc/nginx/snippets/authelia-authreq.conf;
        proxy_pass http://docs-private:3000;
        include /etc/nginx/snippets/proxy-params.conf;
    }
}
