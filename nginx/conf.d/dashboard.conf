# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dashboard.aboutdevops.my.id;
    include /etc/nginx/snippets/redirect-https.conf;
}

# HTTPS - dashboard.aboutdevops.my.id
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dashboard.aboutdevops.my.id;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/security-headers.conf;

    resolver 127.0.0.11 valid=5s;

    location / {
        set $upstream http://frontend:3000;
        proxy_pass $upstream;
        include /etc/nginx/snippets/proxy-params.conf;
    }
}
