# SSL check/renew. Secrets: SSH_*, DEPLOY_PATH, CLOUDFLARE_API_TOKEN, SSL_EMAIL
# Non-root needs NOPASSWD sudo. Keep script_stop: false.

name: SSL Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ssl-check.yml"
      - "scripts/ssl-check.sh"
      - "docker-compose.yml"

jobs:
  ssl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: scripts/ssl-check.sh
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Run SSL check
        uses: appleboy/ssh-action@v1.2.0
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          DOMAIN: aboutdevops.my.id
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          request_pty: true
          script_stop: false
          envs: CLOUDFLARE_API_TOKEN,SSL_EMAIL,DOMAIN,DEPLOY_PATH
          script: |
            cd "$DEPLOY_PATH"
            chmod +x scripts/ssl-check.sh
            EMAIL="$SSL_EMAIL" ./scripts/ssl-check.sh
