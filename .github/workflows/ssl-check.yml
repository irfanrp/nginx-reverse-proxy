# Check / issue / renew wildcard SSL via Certbot + Cloudflare DNS-01.
# Jalan di GitHub-hosted (ubuntu-latest), lalu SSH ke VPS.
#
# Secrets:
#   SSH_HOST              — IP / hostname VPS
#   SSH_USER              — user SSH (mis. root / deploy)
#   SSH_PRIVATE_KEY       — private key (PEM) untuk SSH
#   SSH_PORT              — opsional, default 22
#   DEPLOY_PATH           — path absolut repo di VPS (folder yang punya docker-compose.yml)
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token (edit DNS zone)
#   SSL_EMAIL             — email registrasi Let's Encrypt

name: SSL Check

on:
  workflow_dispatch:
  schedule:
    # Cek tiap Senin 03:00 UTC
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ssl-check.yml"
      - "docker-compose.yml"

jobs:
  ssl:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSL on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: CLOUDFLARE_API_TOKEN,SSL_EMAIL,DOMAIN,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail

            echo "=== Setup SSL ==="
            DOMAIN="${DOMAIN:-aboutdevops.my.id}"
            CERT_DIR="/etc/letsencrypt/live/${DOMAIN}"

            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "ERROR: secret DEPLOY_PATH kosong. Isi path absolut repo di VPS."
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: DEPLOY_PATH tidak ada: $DEPLOY_PATH"
              exit 1
            fi
            if [ ! -f "$DEPLOY_PATH/docker-compose.yml" ]; then
              echo "ERROR: docker-compose.yml tidak ada di: $DEPLOY_PATH"
              ls -la "$DEPLOY_PATH" || true
              exit 1
            fi

            cd "$DEPLOY_PATH"
            echo "Working dir: $(pwd)"

            if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${SSL_EMAIL:-}" ]; then
              echo "ERROR: secrets CLOUDFLARE_API_TOKEN dan SSL_EMAIL wajib diisi."
              exit 1
            fi

            # Sync secrets ke .env (gitignored) supaya docker compose env_file jalan.
            {
              echo "DOMAIN=${DOMAIN}"
              echo "EMAIL=${SSL_EMAIL}"
              echo "CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}"
            } > .env

            # docker compose butuh akses tulis /etc/letsencrypt → biasanya perlu sudo.
            DC="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose tidak tersedia untuk user ini."
              exit 1
            fi
            # Kalau user gak bisa akses socket / perlu root untuk cert dir, pakai sudo.
            if [ "$(id -u)" -ne 0 ] && command -v sudo >/dev/null 2>&1; then
              if ! docker compose ps >/dev/null 2>&1 || ! test -w /etc/letsencrypt 2>/dev/null; then
                DC="sudo -E docker compose"
              fi
            fi
            echo "Using: $DC"

            issue_cert() {
              echo "Issuing wildcard cert for ${DOMAIN} + *.${DOMAIN}..."
              # DNS-01: gak perlu matiin port 80/443 (nginx tetap jalan).
              $DC run --rm --entrypoint /bin/sh certbot -c '
                set -e
                umask 077
                printf "dns_cloudflare_api_token = %s\n" "$CLOUDFLARE_API_TOKEN" > /etc/cloudflare.ini
                certbot certonly \
                  --dns-cloudflare \
                  --dns-cloudflare-credentials /etc/cloudflare.ini \
                  --non-interactive --agree-tos \
                  --email "$EMAIL" \
                  -d "$DOMAIN" \
                  -d "*.$DOMAIN"
              '
            }

            renew_cert() {
              echo "Renewing cert..."
              $DC run --rm --entrypoint /bin/sh certbot -c '
                set -e
                umask 077
                printf "dns_cloudflare_api_token = %s\n" "$CLOUDFLARE_API_TOKEN" > /etc/cloudflare.ini
                certbot renew \
                  --dns-cloudflare \
                  --dns-cloudflare-credentials /etc/cloudflare.ini \
                  --quiet
              '
            }

            # /etc/letsencrypt/live biasanya root-only → cek pakai sudo.
            cert_exists() {
              if [ "$(id -u)" -eq 0 ]; then
                test -f "$CERT_DIR/fullchain.pem"
              else
                sudo test -f "$CERT_DIR/fullchain.pem"
              fi
            }

            read_expiry() {
              if [ "$(id -u)" -eq 0 ]; then
                openssl x509 -enddate -noout -in "$CERT_DIR/fullchain.pem" | cut -d= -f2
              else
                sudo openssl x509 -enddate -noout -in "$CERT_DIR/fullchain.pem" | cut -d= -f2
              fi
            }

            if ! cert_exists; then
              echo "Cert belum ada di $CERT_DIR → issue baru."
              issue_cert
              echo "SSL setup complete!"
            else
              EXPIRY=$(read_expiry)
              EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
              NOW_EPOCH=$(date +%s)
              DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

              echo "SSL found. Expires in ${DAYS_LEFT} days."
              if [ "$DAYS_LEFT" -lt 30 ]; then
                renew_cert
                echo "SSL renewed!"
              else
                echo "SSL still valid, skipping."
              fi
            fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          DOMAIN: aboutdevops.my.id
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
