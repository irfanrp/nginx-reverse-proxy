# Wildcard SSL via Certbot + Cloudflare DNS-01 (SSH to VPS).
name: SSL Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ssl-check.yml"
      - "docker-compose.yml"

jobs:
  ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Check / renew SSL
        uses: appleboy/ssh-action@v1.2.0
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          DOMAIN: aboutdevops.my.id
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          request_pty: true
          script_stop: false
          envs: CLOUDFLARE_API_TOKEN,SSL_EMAIL,DOMAIN,DEPLOY_PATH
          script: |
            bash -s <<'END'
            set -euo pipefail

            DOMAIN="${DOMAIN:-aboutdevops.my.id}"
            CERT="/etc/letsencrypt/live/${DOMAIN}/fullchain.pem"

            : "${DEPLOY_PATH:?DEPLOY_PATH secret is empty}"
            : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN secret is empty}"
            : "${SSL_EMAIL:?SSL_EMAIL secret is empty}"
            [[ -f "${DEPLOY_PATH}/docker-compose.yml" ]] || {
              echo "ERROR: docker-compose.yml not found in ${DEPLOY_PATH}"
              exit 1
            }

            cd "${DEPLOY_PATH}"
            printf 'DOMAIN=%s\nEMAIL=%s\nCLOUDFLARE_API_TOKEN=%s\n' \
              "${DOMAIN}" "${SSL_EMAIL}" "${CLOUDFLARE_API_TOKEN}" > .env

            sudo true

            certbot_sh() {
              sudo -E docker compose run --rm --no-deps --entrypoint sh certbot -c "$1"
            }

            if sudo test -f "${CERT}"; then
              EXPIRY="$(sudo openssl x509 -enddate -noout -in "${CERT}" | cut -d= -f2)"
              DAYS_LEFT=$(( ( $(date -d "${EXPIRY}" +%s) - $(date +%s) ) / 86400 ))
              echo "Cert OK — ${DAYS_LEFT} days left (expires ${EXPIRY})"

              if [[ "${DAYS_LEFT}" -ge 30 ]]; then
                echo "Skip renew"
                exit 0
              fi

              echo "Renewing..."
              certbot_sh '
                set -e; umask 077
                printf "dns_cloudflare_api_token = %s\n" "$CLOUDFLARE_API_TOKEN" > /etc/cloudflare.ini
                certbot renew --dns-cloudflare --dns-cloudflare-credentials /etc/cloudflare.ini --quiet
              '
              echo "Renewed"
            else
              echo "Issuing wildcard for ${DOMAIN}..."
              certbot_sh '
                set -e; umask 077
                printf "dns_cloudflare_api_token = %s\n" "$CLOUDFLARE_API_TOKEN" > /etc/cloudflare.ini
                certbot certonly --dns-cloudflare --dns-cloudflare-credentials /etc/cloudflare.ini \
                  --non-interactive --agree-tos --email "$EMAIL" \
                  -d "$DOMAIN" -d "*.$DOMAIN"
              '
              echo "Issued"
            fi
            END
