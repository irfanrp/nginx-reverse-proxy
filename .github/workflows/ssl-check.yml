# Check / issue / renew wildcard SSL via Certbot + Cloudflare DNS-01.
# Jalan di GitHub-hosted (ubuntu-latest), lalu SSH ke VPS.
#
# Secrets:
#   SSH_HOST              — IP / hostname VPS
#   SSH_USER              — user SSH (mis. ubuntu)
#   SSH_PRIVATE_KEY       — private key (PEM) untuk SSH
#   SSH_PORT              — opsional, default 22
#   DEPLOY_PATH           — path absolut repo di VPS, mis. /home/ubuntu/infra/nginx-reverse-proxy
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token (edit DNS zone)
#   SSL_EMAIL             — email registrasi Let's Encrypt

name: SSL Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ssl-check.yml"
      - "docker-compose.yml"

jobs:
  ssl:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSL on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: CLOUDFLARE_API_TOKEN,SSL_EMAIL,DOMAIN,DEPLOY_PATH
          script_stop: true
          script: |
            set -eu

            echo "=== Setup SSL ==="
            DOMAIN="${DOMAIN:-aboutdevops.my.id}"
            CERT_PEM="/etc/letsencrypt/live/${DOMAIN}/fullchain.pem"

            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "ERROR: secret DEPLOY_PATH kosong."
              echo "Contoh: /home/ubuntu/infra/nginx-reverse-proxy"
              exit 1
            fi
            if [ ! -f "$DEPLOY_PATH/docker-compose.yml" ]; then
              echo "ERROR: docker-compose.yml tidak ada di: $DEPLOY_PATH"
              ls -la "$DEPLOY_PATH" || true
              exit 1
            fi

            cd "$DEPLOY_PATH"
            echo "Working dir: $(pwd)"
            echo "User: $(whoami) uid=$(id -u)"

            if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${SSL_EMAIL:-}" ]; then
              echo "ERROR: secrets CLOUDFLARE_API_TOKEN dan SSL_EMAIL wajib diisi."
              exit 1
            fi

            {
              echo "DOMAIN=${DOMAIN}"
              echo "EMAIL=${SSL_EMAIL}"
              echo "CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}"
            } > .env

            # Cek cert: live/ biasanya root-only → selalu lewat sudo.
            echo "Checking cert: $CERT_PEM"
            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            else
              SUDO="sudo -n"
              if ! $SUDO true 2>/dev/null; then
                echo "ERROR: user $(whoami) butuh passwordless sudo (sudo -n gagal)."
                echo "Tambah NOPASSWD di sudoers, atau pakai SSH_USER=root."
                exit 1
              fi
            fi

            if $SUDO test -f "$CERT_PEM"; then
              echo "Cert ADA."
              EXPIRY=$($SUDO openssl x509 -enddate -noout -in "$CERT_PEM" | cut -d= -f2)
              echo "Raw expiry: $EXPIRY"

              EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s) || {
                echo "ERROR: gagal parse tanggal expiry: $EXPIRY"
                exit 1
              }
              NOW_EPOCH=$(date +%s)
              DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
              echo "SSL expires in ${DAYS_LEFT} days."

              if [ "$DAYS_LEFT" -ge 30 ]; then
                echo "SSL still valid, skipping."
                exit 0
              fi

              echo "SSL expires in <30 days → renewing..."
              $SUDO docker compose run --rm --entrypoint /bin/sh certbot -c '
                set -e
                umask 077
                printf "dns_cloudflare_api_token = %s\n" "$CLOUDFLARE_API_TOKEN" > /etc/cloudflare.ini
                certbot renew \
                  --dns-cloudflare \
                  --dns-cloudflare-credentials /etc/cloudflare.ini \
                  --quiet
              '
              echo "SSL renewed!"
            else
              echo "Cert BELUM ADA → issuing wildcard..."
              $SUDO docker compose run --rm --entrypoint /bin/sh certbot -c '
                set -e
                umask 077
                printf "dns_cloudflare_api_token = %s\n" "$CLOUDFLARE_API_TOKEN" > /etc/cloudflare.ini
                certbot certonly \
                  --dns-cloudflare \
                  --dns-cloudflare-credentials /etc/cloudflare.ini \
                  --non-interactive --agree-tos \
                  --email "$EMAIL" \
                  -d "$DOMAIN" \
                  -d "*.$DOMAIN"
              '
              echo "SSL setup complete!"
            fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          DOMAIN: aboutdevops.my.id
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
