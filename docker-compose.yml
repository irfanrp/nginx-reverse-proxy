services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    networks:
      - proxy

  certbot:
    image: certbot/dns-cloudflare
    container_name: certbot
    restart: unless-stopped
    env_file: .env
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; umask 077; printf \"dns_cloudflare_api_token = %s\\n\" \"$${CLOUDFLARE_API_TOKEN}\" > /etc/cloudflare.ini; while :; do certbot renew --dns-cloudflare --dns-cloudflare-credentials /etc/cloudflare.ini; sleep 12h & wait $${!}; done;'"
    networks:
      - proxy

networks:
  proxy:
    external: true
